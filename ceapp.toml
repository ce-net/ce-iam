# ce-iam — identity/access/secrets over CE capabilities. Installed + supervised by the one `ce` node via ce-appmgr.
[app]
name    = "ce-iam"
version = "0.1.0"
summary = "IAM over CE capabilities: mint, attenuate, verify, revoke; runs the node-auth responder daemon."
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"
provides = ["auth", "iam"]
[native]
bin = "ce-iam"
[native.artifacts]
"darwin-amd64" = "PLACEHOLDER_darwin_amd64"
"linux-amd64"  = "PLACEHOLDER_linux_amd64"
[deps]
# local CE node for on-chain revoke lookups; device/root key store on disk.
[sandbox]
tier       = "none"
net        = "none"
capability = "inherit"
[daemon]
enabled = true
args    = ["node-auth"]   # the passwordless browser<->node auth responder (long-running)
restart = "on-failure"
