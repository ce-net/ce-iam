name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch: {}
jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    steps:
      - uses: actions/checkout@v4
        with: { path: ce-iam }
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce-rs, path: ce-rs }
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce, path: ce }
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce-pin, path: ce-pin }
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce-secrets-rs, path: ce-secrets-rs }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: ce-iam }
      - run: cargo build --all
        working-directory: ce-iam
      - run: cargo test --all
        working-directory: ce-iam
